<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <!-- <link rel="stylesheet" href="home.css"> -->
    <title>Window</title>
  </head>
  <body>
    <!-- <div id="myButton">
      <button class="start-button">Enter The Dream</button>
    </div> -->
    <canvas id="windowCanvas" width="500" height="500"></canvas>
<script>
const canvas = document.getElementById("windowCanvas");
const ctx = canvas.getContext("2d");

const windowWidth = canvas.width * 0.6;
const windowHeight = canvas.height * 0.6;
const windowX = (canvas.width - windowWidth) / 2;
const windowY = (canvas.height - windowHeight) / 2;

let isBreaking = false;

function drawWindow() {
    ctx.fillStyle = "#8B7355"; // 画背景墙
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.clearRect(windowX, windowY, windowWidth, windowHeight); // 窗户区域
    ctx.strokeStyle = "#000000";
    ctx.lineWidth = 10;
    ctx.strokeRect(windowX, windowY, windowWidth, windowHeight);
}

function drawCrack(x, y, length, angle, depth) {
    if (depth > 5 || length < 5) return; // 递归终止条件

    const endX = x + Math.cos(angle) * length;
    const endY = y + Math.sin(angle) * length;

    ctx.strokeStyle = "rgba(0, 0, 0, 0.8)";
    ctx.lineWidth = Math.max(1, 4 - depth); // 越深层的裂缝越细
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(endX, endY);
    ctx.stroke();

    setTimeout(() => {
        // 生成新的裂缝
        drawCrack(endX, endY, length * (Math.random() * 1.2 + 0.7), angle + Math.random() * Math.PI * 4 - Math.PI * 2, depth + 1);
        drawCrack(endX, endY, length * (Math.random() * 1.2 + 0.7), angle - Math.random() * Math.PI * 4 - Math.PI * 2, depth + 1);
    }, 100); // 让裂缝动画逐步展开
}

canvas.addEventListener("click", () => {
    if (!isBreaking) {
        isBreaking = true;
        drawCrack(canvas.width / 2, canvas.height / 2, 50, Math.random() * Math.PI * 2, 0);
    }
});

drawWindow();
</script>



  </body>
  <!-- <script type="text/javascript" src="home.js"></script> -->
</html>
